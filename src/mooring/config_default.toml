# Default configuration baked into the distributed artifact.
# An admin edits this file before building, so teammates receive a
# pre-configured app. Users can override any value in
# %APPDATA%\mooring\config.toml or via MOORING_* environment variables.

[github]
client_id = ""   # OAuth app client id (device flow enabled); public, no secret
owner = ""       # GitHub org or user that owns the shared notebooks repo
repo = ""        # name of the shared notebooks repo
branch = "main"
host = "github.com"  # GitHub Enterprise: your instance's host, e.g. ghe.example.com

# Several repos can be registered under [repos.<alias>] tables; one is active
# at a time ("active" is reserved as the pointer key, not a valid alias).
# When any [repos] section exists it replaces the [github] owner/repo above.
#
# [repos]
# active = "team"
#
# [repos.team]
# owner = "acme"
# repo = "notebooks"
# branch = "main"
# workspace = ""   # optional override; empty = ~/PythonProjects/mooring/<owner>/<repo>

[sync]
folders = ["notebooks", "data", "reports"]
# Extra paths to keep out of GitHub, on top of the always-skipped ones
# (dotfiles, __pycache__, marimo's __marimo__ session folder). Case-sensitive
# globs: a bare pattern matches any path segment at any depth (e.g. "*.tmp",
# "scratch"; a trailing "/" like "scratch/" works too); one containing "/"
# matches the whole path, where "*" spans "/" (so "reports/drafts/*" also hides
# "reports/drafts/sub/deep.py"). A bare pattern equal to a folders name hides
# that whole synced folder.
exclude = []
warn_file_mb = 10
max_file_mb = 45

[workspace]
path = ""        # empty = ~/PythonProjects/mooring/<owner>/<repo>

# Central logging. Set `endpoint` to collect usage events and errors from every
# copy of the app in one place. The value is auto-detected:
#   http(s)://...  -> each event is POSTed as JSON
#   anything else  -> treated as a folder/UNC path; events are appended as a
#                     per-user JSONL file (e.g. \\server\share\mooring-logs).
# Empty = disabled (the shipped default). When set, it is always on for users.
[logging]
endpoint = ""
level = "info"   # "info" logs usage + errors; "error" logs only errors

# Appearance, shared by the hub page, the AI chat, and the marimo notebooks.
# Users switch it from the toggle in the hub header; this is just the default.
#   "system" — follow the operating system's light/dark setting (the default)
#   "light"  — always light
#   "dark"   — always dark
# Whatever is chosen on the hub is written into each workspace's .marimo.toml
# (display.theme) so notebooks open in the same theme — newly opened notebooks
# pick it up immediately; reload an already-open notebook to re-theme it.
[ui]
theme = "system"

# AI copilot. When enabled and Copilot is connected, the hub's "AI" button
# opens an interactive chat that helps write notebook code. It is schema-only:
# the assistant sees a dataset's column names + types (never any data value) and
# the notebook's source, and can propose cells you approve into the open
# notebook. Requires the optional `mooring[copilot]` extra and a GitHub Copilot
# licence. See docs/admins/ai-privacy.md.
[ai]
enabled = true              # set false to hide the AI copilot entirely
provider = "copilot"        # AI backend; "copilot" = GitHub Copilot (pluggable)
model = ""                  # default model id; empty = the provider's default (users can pick in the chat)
reasoning_effort = ""       # default reasoning effort; empty = the model's default (users can pick per model)
chat_idle_timeout_sec = 900 # close an idle chat session after this many seconds
live_schema = true          # read the schema of dataframes live in the running notebook
                            # kernel (covers data loaded from OUTSIDE the workspace, and
                            # derived frames), refreshed on each chat turn so frames you
                            # add mid-session are picked up without reopening. Value-free —
                            # names + dtypes only, never a value; set false to disable.
                            # See docs/admins/ai-privacy.md.

# Per-notebook off switch: a user can turn the copilot off for ONE notebook (from
# the hub row or the chat window) — e.g. before working with PII. That lives in a
# SYNCED <workspace>/mooring.toml ([ai] disabled_notebooks = [...]) so the decision
# travels to teammates, NOT in this per-machine config. Enforced at open/send/apply.

# Team context for the copilot — OPT-IN, off by default. When `context = true`,
# mooring reads `<workspace>/context/` and feeds the assistant:
#   - instructions.md            free-text guidance (the copilot-instructions.md
#                                equivalent), sent VERBATIM — never put real values
#                                or secrets in it; it is secret-scanned and withheld
#                                on a hit, but that is best-effort, not a guarantee.
#   - dictionaries/*.yaml        per-domain data dictionaries (dbt schema.yml and
#                                other shapes auto-detected); reduced to column
#                                names/types/keys/descriptions only and pulled in
#                                relevant slices. Run `mooring ai dictionary check`
#                                to see how your files parse.
# Unlike the dataset schema (which structurally cannot carry a value), this team
# context carries whatever the author wrote — see docs/admins/ai-privacy.md.
context = false             # set true to enable team instructions + data dictionary
context_dir = "context"     # workspace-relative folder mooring reads context from
context_max_kb = 256        # cap on the instructions text injected per chat

# Best-effort structured-PII pre-flight scan — OPT-IN, off by default. When
# `enabled = true`, mooring scans text on its way to the AI server (your chat
# prompt, the notebook source, schema column names, and team context) for
# well-formed payment cards, IBANs, NHS numbers, emails, and UK NINOs, and
# warns/withholds before it leaves. It is DEFENCE IN DEPTH, NOT a guarantee: it
# catches NONE of names, addresses, sort codes, account numbers, SSNs, phones, or
# values typed into prose — those are out of scope of a regex scan. The real
# guarantee remains the schema-only design (see docs/admins/ai-privacy.md). Run
# `mooring ai pii check` to scan your files offline before enabling it.
[ai.pii]
enabled = false             # master switch; off = behaviour is byte-identical to today
block_prompt = true         # on a hit, HOLD the chat prompt and make the analyst
                            # confirm "send anyway" (set false for a warn-only advisory)
scan_notebook_source = true # show a one-time banner if the notebook/its schema looks
                            # like it contains PII (kill-switch for identifier-dense notebooks)

# Phase 2 — optional NAME detection (catches "Jane Smith", which the structured
# scan above cannot). Needs the `mooring[pii]` extra (pip install mooring[pii]),
# which adds a LOCAL zero-shot NER model — text is scanned on this machine, never
# sent anywhere to be scanned; only a one-time model download hits the network
# (pre-fetch with `mooring ai pii model`). Best-effort, not a guarantee. Only acts
# when `enabled` above is true.
detect_names = false        # turn on local NER name detection
# Which backend detects names/orgs:
#   "auto" (default) — just works with whatever you installed: uses the OFFLINE
#                      "spacy" backend when the pii-spacy extra + its model are present,
#                      otherwise "gliner". So `pip install mooring[pii-spacy]` (or
#                      mooring[pii]) is enough — no need to also edit this setting.
#   "gliner"         — pin the zero-shot model downloaded from Hugging Face on first use.
#   "spacy"          — pin the OFFLINE backend, for PyPI-only / air-gapped teams that
#                      can't reach Hugging Face. Needs `pip install mooring[pii-spacy]`,
#                      which bundles an MIT-licensed model from PyPI (no HF, no GitHub).
#                      The name_model_* settings below are GLiNER's and are ignored.
# Run `mooring ai pii doctor` to see which backend will run and whether it's ready.
name_backend = "auto"
# For name_backend = "spacy": leave name_model = "" to use the bundled model, or set
# it to a spaCy model name / a folder you've sideloaded. (No revision/variant.)
# Default GLiNER model is a SAFETENSORS build loaded as its bf16 variant — no pickle
# (`pytorch_model.bin`) is ever downloaded or loaded — pinned to a commit for
# reproducibility/review. Set name_model_variant = "" for a model that has no
# variant safetensors (it then loads the repo's default weights file).
name_model = "gliner-community/gliner_small-v2.5"  # GLiNER model id (downloaded on first use)
name_model_revision = "f227d3cd637bd4e6757ae143935316d062393341"  # pinned commit ("" = latest)
name_model_variant = "bf16" # safetensors variant to load ("" = repo default weights file)
name_labels = ["person", "name"]            # entity labels to flag (zero-shot, so any
                            # label works); add "organization" to also flag business
                            # names, e.g. ["person", "name", "organization"]
name_threshold = 0.7        # confidence cut-off; raise for fewer/safer hits, lower for more
