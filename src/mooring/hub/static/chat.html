<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mooring · AI copilot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="chat-body">
  <!-- A terminal-style REPL beside the marimo tab. The model streams over SSE;
       proposed cells are Applied (appended + run) into the open notebook. mooring
       talks to marimo over HTTP only — outputs/values never reach this page. -->
  <div id="term">
    <div id="topbar">
      <span class="prompt-glyph">&#9875;</span>
      <span class="topbar-title">mooring copilot</span>
      <span id="chat-target" class="muted"></span>
      <span class="badge synced" title="The assistant only ever sees column names &amp; types, never data values">schema-only</span>
    </div>

    <section id="messages" aria-live="polite"></section>

    <div id="prompt-area">
      <div id="autocomplete" class="hidden" role="listbox"></div>
      <div class="prompt-row">
        <span class="prompt-gutter">&gt;</span>
        <textarea id="chat-input" rows="1" spellcheck="false" autocomplete="off"
          placeholder="Ask for help — try /help, or @ to reference a dataset"></textarea>
      </div>
    </div>

    <div id="statusbar">
      <label class="status-ctrl">model
        <select id="chat-model"></select>
      </label>
      <label id="effort-wrap" class="status-ctrl hidden">effort
        <select id="chat-effort"></select>
      </label>
      <span class="status-sep">&#9474;</span>
      <span id="ner-status" class="status-seg hidden"></span>
      <span id="chat-status" class="status-state"></span>
    </div>
  </div>

  <div id="error-banner" class="hidden"></div>

  <script src="/static/chat_core.js"></script>
  <script src="/static/chat.js"></script>
</body>
</html>
