<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mooring · AI copilot</title>
  <!-- Apply the theme before first paint (mirrors the hub): last-used theme, else
       the server's inlined default — so opening this window directly (empty
       localStorage) is correct too. The hub owns the toggle; this window follows
       via /api/state and a same-origin storage event when the theme changes. -->
  <script>
    try {
      document.documentElement.dataset.theme =
        localStorage.getItem("mooring.ui.theme") || "__MOORING_DEFAULT_THEME__";
    } catch {
      // localStorage may be unavailable (private mode); the CSS default applies.
    }
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="chat-body">
  <!-- A terminal-style REPL beside the marimo tab. The model streams over SSE;
       proposed cells are Applied (appended + run) into the open notebook. mooring
       talks to marimo over HTTP only — outputs/values never reach this page. -->
  <div id="term">
    <div id="topbar">
      <span class="prompt-glyph">&#9875;</span>
      <span class="topbar-title">mooring copilot</span>
      <span id="chat-target" class="muted"></span>
      <span class="badge synced" title="The assistant only ever sees column names &amp; types, never data values">schema-only</span>
      <span id="pii-badge" class="badge hidden"></span>
      <button id="disable-ai-btn" class="small"
        title="Turn the copilot off for this notebook (shared with your team) — e.g. before working with PII">Disable AI</button>
    </div>

    <section id="messages" aria-live="polite"></section>

    <!-- Shown when AI is off for this notebook: the composer is locked and the
         only action is to turn it back on. -->
    <div id="disabled-notice" class="hidden"></div>

    <!-- Shown when Copilot isn't signed in (a separate sign-in from the GitHub
         login). Offers an in-app "Sign in to Copilot" button + browser device
         flow, then reopens the chat once authorised. -->
    <div id="signin-notice" class="hidden"></div>

    <div id="prompt-area">
      <div id="autocomplete" class="hidden" role="listbox"></div>
      <div class="prompt-row">
        <span class="prompt-gutter">&gt;</span>
        <textarea id="chat-input" rows="1" spellcheck="false" autocomplete="off"
          aria-label="Chat message"
          placeholder="Ask for help — try /help, or @ to reference a dataset"></textarea>
      </div>
    </div>

    <div id="statusbar">
      <label class="status-ctrl">model
        <select id="chat-model"></select>
      </label>
      <label id="effort-wrap" class="status-ctrl hidden">effort
        <select id="chat-effort"></select>
      </label>
      <span class="status-sep">&#9474;</span>
      <span id="ner-status" class="status-seg hidden"></span>
      <span id="chat-status" class="status-state"></span>
    </div>
  </div>

  <div id="error-banner" class="hidden"></div>

  <script src="/static/chat_core.js"></script>
  <script src="/static/chat.js"></script>
</body>
</html>
