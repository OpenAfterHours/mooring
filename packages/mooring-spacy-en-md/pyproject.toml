[project]
name = "mooring-spacy-en-md"
version = "0.1.0"
description = "Vendored MIT-licensed spaCy en_core_web_md model, so mooring's offline PII name detection works in PyPI-only / air-gapped environments (no Hugging Face, no GitHub at install time)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
# No runtime dependencies: this package is pure model DATA plus a path helper. The
# spaCy *library* that loads the model is pulled by mooring's `pii-spacy` extra, not
# here — so a default `uv sync` never drags spaCy in.
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mooring_spacy_en_md"]
# The model bytes (src/mooring_spacy_en_md/_model/**) are git-ignored and vendored
# by scripts/vendor_spacy_model.py before a release build — force-include them in
# the wheel as artifacts so they ship even though git doesn't track them.
artifacts = [
    "src/mooring_spacy_en_md/_model/**",
]
