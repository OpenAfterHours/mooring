# Zensical configuration for the mooring documentation site.
#
# Build:   uv run zensical build     -> static site in ./site
# Preview: uv run zensical serve     -> local dev server with live reload
#
# The site is published to GitHub Pages by .github/workflows/docs.yml on every
# push to the default branch. See docs/developers/contributing.md.

[project]

site_name = "Mooring"
site_description = "Git-free marimo notebook sharing via GitHub — docs for analysts, admins, and contributors."
site_author = "The mooring authors"

# Canonical URL for the published site. Uncomment and set this to your GitHub
# Pages URL once the repo is known, e.g. https://your-org.github.io/mooring/
# Left unset so the build produces relative links that work under any path.
#site_url = "https://your-org.github.io/mooring/"

copyright = """
Copyright &copy; 2026 The mooring authors
"""

# Source repo (also used by the landing page's GitHub links). Adjust if the
# repo moves; the OpenAfterHours/mooring slug keeps it sibling-consistent.
repo_url = "https://github.com/OpenAfterHours/mooring"
repo_name = "OpenAfterHours/mooring"

# OpenAfterHours design system (night-sky theme) + the custom landing page.
extra_css = [
  "assets/stylesheets/oah-theme.css",
  "assets/stylesheets/landing.css",
]
extra_javascript = ["assets/javascripts/landing.js"]

# Explicit navigation so ordering and titles are deterministic rather than
# derived from the docs/ directory layout.
nav = [
  { "Home" = "index.md" },
  { "For users" = [
    { "Install & first run" = "users/index.md" },
    { "Daily workflow" = "users/daily-workflow.md" },
    { "Resolving conflicts" = "users/conflicts.md" },
    { "Command-line reference" = "users/cli.md" },
  ] },
  { "For admins" = [
    { "Overview & checklist" = "admins/index.md" },
    { "GitHub setup" = "admins/github-setup.md" },
    { "Configuration" = "admins/configuration.md" },
    { "Build & distribute" = "admins/build-and-distribute.md" },
  ] },
  { "For developers" = [
    { "Architecture" = "developers/index.md" },
    { "Contributing" = "developers/contributing.md" },
  ] },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

language = "en"
custom_dir = "overrides"
logo = "assets/images/anchor-mark.svg"
favicon = "assets/images/favicon.svg"

features = [
    "announce.dismiss",
    # Enable these once repo_url is set above:
    #"content.action.edit",
    #"content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# Inter (UI/body) + JetBrains Mono (code); Space Grotesk for display headings
# is loaded via @import in oah-theme.css.
[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# slate first => the dark night-sky scheme is the default; light is the toggle.
# primary/accent = orange; oah-theme.css keeps the header dark and links orange.
[[project.theme.palette]]
scheme = "slate"
primary = "orange"
accent = "orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "orange"
accent = "orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

# ----------------------------------------------------------------------------
# Markdown extensions — copied from the zensical default template so the pages
# can use admonitions, collapsible blocks, content tabs, code annotations,
# task lists, mermaid diagrams, and keyboard keys.
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
