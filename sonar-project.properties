# SonarQube Cloud (https://sonarcloud.io) analysis configuration.
# Consumed by the "sonarqube" job in .github/workflows/ci.yml.
#
# IMPORTANT: the two identifiers below must match the project you create in
# SonarQube Cloud (sonarcloud.io -> "Analyze new project" -> import this repo).
# After import, SonarQube Cloud shows you the exact `sonar.organization` and
# `sonar.projectKey` to use — copy them here if they differ from the defaults.
# The defaults assume the keys auto-generated for the GitHub OpenAfterHours org.
sonar.organization=openafterhours
sonar.projectKey=OpenAfterHours_mooring

# Display name in the SonarQube Cloud UI.
sonar.projectName=mooring

# Static analysis only (no coverage import). Point Sonar at the product code in
# src/ and mark tests/ as test sources so test files are analyzed as tests
# rather than flagged as untested product code.
sonar.sources=src
sonar.tests=tests

# Supported Python versions — matches requires-python (">=3.12") and the 3.13 CI
# runner — so version-specific Python rules apply correctly.
sonar.python.version=3.12, 3.13

# Keep non-product trees out of analysis:
#   docs/**       zensical site sources, not application code
#   packages/**   the mooring-spacy-en-md PyPI companion (a separate project)
#   tests/js/**   exercised by Node's own test runner; not Python
sonar.exclusions=docs/**, packages/**, tests/js/**
