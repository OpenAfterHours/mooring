# SonarQube Cloud (https://sonarcloud.io) analysis configuration.
#
# mooring is analyzed by SonarQube Cloud *Automatic Analysis*: the SonarCloud
# GitHub App scans every push / PR — there is no scanner step in CI and no
# SONAR_TOKEN, matching the rest of the OpenAfterHours org (e.g. rwa_calculator).
# This file only configures the analysis scope; the project/organization binding
# comes from the GitHub App connection.
sonar.projectKey=OpenAfterHours_mooring
sonar.organization=openafterhours

# Analysis scope. src/ is product code; tests/ is classified as test sources so
# test-only findings aren't counted as product issues. Keep the roots disjoint
# to avoid the "path in both sources and tests" analysis error.
sonar.sources=src
sonar.tests=tests

# Supported Python versions — matches requires-python (">=3.12") and the 3.13 CI
# runner — so version-specific Python rules apply correctly.
sonar.python.version=3.12, 3.13

# Keep non-product / non-Python trees out of analysis:
#   docs/**       zensical site sources, not application code
#   packages/**   the mooring-spacy-en-md PyPI companion (a separate project)
#   tests/js/**   exercised by Node's own test runner; not Python
sonar.exclusions=docs/**, packages/**, tests/js/**
