name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # softprops/action-gh-release creates the GitHub Release
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Python 3.13 (frozen-build target + moonlit)
        run: uv python install 3.13

      - name: Sync dependencies
        # --extra copilot pulls github-copilot-sdk (the `copilot` module) so the
        # copilot chat-session tests can import it. It lives in the optional extra,
        # not the shipped base deps, so CI must opt in to run those tests.
        run: uv sync --extra copilot

      - name: Lint
        run: uv run ruff check src tests

      - name: Check architecture layering
        # Enforces the dependency-direction contracts in .importlinter so a
        # backwards import (e.g. the web hub reaching into the CLI) can't slip in.
        run: uv run lint-imports

      - name: Test
        run: uv run pytest -q

      - name: Build artifacts
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          uvx --python 3.13 moonlit build -e mooring.cli:main -o dist/mooring.pyz --python-version 3.13
          uvx --python 3.13 moonlit build -e mooring.cli:main -o dist/mooring.exe --windows-exe --python-version 3.13

      - name: Smoke test artifact without git on PATH
        # Strip PATH to the Python directory alone: proves the artifact works
        # on a machine that has Python but no git or other dev tooling.
        run: |
          $py = (uv python find 3.13)
          $env:PATH = (Split-Path $py)
          & $py dist/mooring.pyz selftest
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/mooring.pyz
            dist/mooring.exe
          generate_release_notes: true

  pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/mooring
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing; no token secret needed
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Check tag matches project version
        # scripts/release.py keeps these in sync; this guard catches hand-rolled tags
        run: |
          version=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
          init_version=$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' src/mooring/__init__.py)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ] || [ "$init_version" != "$tag" ]; then
            echo "Tag v$tag, pyproject.toml $version, __init__.py $init_version disagree" >&2
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        run: uv publish
