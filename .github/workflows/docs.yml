name: docs

# Build the zensical documentation site and publish it to GitHub Pages.
# Runs on pushes to the default branch that touch the docs, and on demand.
#
# One-time setup: in the repository, set
#   Settings -> Pages -> Source = GitHub Actions
# for the first deploy to publish.

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Permissions are scoped per-job (least privilege): build only reads the repo;
# deploy alone gets the Pages + OIDC write scopes.

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Build the docs site
        run: uv run zensical build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
