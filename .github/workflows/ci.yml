name: ci

# Runs on every push to master and on every pull request, so changes self-check
# before merge. (release.yml runs the same Python checks again at tag time, just
# before it builds the frozen artifacts.) Windows to match the primary target and
# the release environment.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        # --extra copilot pulls the github-copilot-sdk so the chat-session tests
        # can import it (it is an optional extra, not a shipped base dependency).
        run: uv sync --extra copilot

      - name: Lint
        run: uv run ruff check src tests

      - name: Check architecture layering
        # Enforces the dependency-direction contracts in .importlinter. Skipped
        # until that file lands (it arrives with the layering PR); auto-activates
        # once present.
        if: hashFiles('.importlinter') != ''
        run: uv run lint-imports

      - name: Test (Python)
        run: uv run pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test (JS — copilot REPL pure helpers)
        # The chat REPL's risky pure logic (slash parser, history ring, @-mentions,
        # XSS-safe highlighter). Zero deps: Node's built-in test runner.
        run: node --test tests/js/

  sonarqube:
    name: SonarQube Cloud
    # The Sonar scanner ships as a Linux container action, so it can't ride the
    # Windows `test` job above; it runs here on Linux in parallel. Static
    # analysis only — no test run or coverage import — so it needs nothing from
    # the test job. Config lives in sonar-project.properties at the repo root.
    runs-on: ubuntu-latest
    # SONAR_TOKEN is a repo secret and is NOT exposed to workflows triggered by
    # forked PRs. Skip the scan there (it would otherwise fail with no token)
    # while still running on pushes to master and on same-repo branch PRs.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar's new-code detection and SCM blame need full history, not the
          # default shallow clone.
          fetch-depth: 0

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          # Created in SonarQube Cloud (My Account -> Security, or the project's
          # GitHub Actions tutorial) and added as a repo Actions secret. For
          # SonarQube Cloud, SONAR_HOST_URL must NOT be set — that is Server-only.
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
